<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ASH Educational Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="app">
        <!-- Login Form -->
        <div id="loginForm" class="auth-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Admin Login</h1>
                    <p>ASH Educational Center</p>
                </div>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                </form>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard" style="display: none;">
            <div class="dashboard-header">
                <h1>Admin Dashboard</h1>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
            
            <div class="dashboard-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Enrollments</h3>
                        <p id="totalEnrollments">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>Pending</h3>
                        <p id="pendingEnrollments">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>Approved</h3>
                        <p id="approvedEnrollments">-</p>
                    </div>
                </div>

                <div class="enrollments-section">
                    <h2>Recent Enrollments</h2>
                    <div id="enrollmentsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="admin.js"></script>
</body>
</html>
